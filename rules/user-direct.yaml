payload:
  # These IANA-reserved examples keep the initial provider valid. Replace or
  # delete them after adding real rules. Keep "- " and omit the policy name.

  # Match a domain and all of its subdomains.
  - DOMAIN-SUFFIX,example.com

  # Match one exact hostname only.
  - DOMAIN,www.example.net

  # Match an IPv4 or IPv6 network; no-resolve avoids an extra DNS lookup.
  - IP-CIDR,192.0.2.0/24,no-resolve
  - IP-CIDR6,2001:db8::/32,no-resolve
